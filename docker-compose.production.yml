services:
  postgres:
    image: postgres:16-alpine
    container_name: bairui-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bairui}
      POSTGRES_USER: ${POSTGRES_USER:-bairui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bairui} -d ${POSTGRES_DB:-bairui}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  hermes-runtime:
    build: .
    container_name: bairui-runtime
    env_file:
      - .env
    environment:
      HERMES_HOST: 0.0.0.0
      HERMES_DATABASE_URL: postgresql://${POSTGRES_USER:-bairui}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bairui}
    ports:
      - "127.0.0.1:${HERMES_PORT:-8787}:8787"
    depends_on:
      postgres:
        condition: service_healthy
      sonic:
        condition: service_started
    volumes:
      - ./data/hermes:/app/data/hermes
      - ./logs/hermes:/app/logs/hermes
      - ./obsidian-vault:/opt/hermes-system/obsidian-vault
    restart: unless-stopped

  sonic:
    image: valeriansaliou/sonic:latest
    container_name: bairui-sonic
    env_file:
      - .env
    environment:
      SONIC_CHANNEL__AUTH_PASSWORD: ${SONIC_PASSWORD:?SONIC_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${SONIC_PORT:-1491}:1491"
    volumes:
      - ./data/sonic:/var/lib/sonic/store
      - ./infra/sonic/config.cfg:/etc/sonic.cfg:ro
    restart: unless-stopped
